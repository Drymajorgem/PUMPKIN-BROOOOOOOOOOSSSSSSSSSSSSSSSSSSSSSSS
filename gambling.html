<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎃 Pumpkin Bros Dice Roller</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#111,#1d1d1d);
overflow:hidden;
}

.card{
background:#222;
padding:40px;
border-radius:20px;
border:4px solid orange;
text-align:center;
box-shadow:0 0 25px orange;
width:340px;
}

h1{
color:orange;
margin-bottom:20px;
}

#dice{
font-size:90px;
margin:20px 0;
transition:.25s;
}

button{
padding:14px 35px;
font-size:20px;
background:orange;
border:none;
border-radius:12px;
cursor:pointer;
color:white;
font-weight:bold;
transition:.25s;
}

button:hover{
transform:scale(1.08);
background:#ff9800;
}

button:active{
transform:scale(.95);
}

#number{
margin-top:20px;
font-size:30px;
color:white;
}

.roll{
animation:spin .45s linear;
}

@keyframes spin{

0%{
transform:rotate(0deg) scale(1);
}

25%{
transform:rotate(90deg) scale(.8);
}

50%{
transform:rotate(180deg) scale(1.2);
}

75%{
transform:rotate(270deg) scale(.8);
}

100%{
transform:rotate(360deg) scale(1);
}

}

.footer{
margin-top:20px;
color:#aaa;
font-size:14px;
}
</style>

</head>
<body>

<div class="card">

<h1>🎃 Pumpkin Bros Dice</h1>

<div id="dice">🎲</div>

<button onclick="rollDice()">ROLL</button>

<div id="number">Roll the dice!</div>

<div class="footer">
Good luck! 🍀
</div>

</div>

<script>

const faces=[
"⚀",
"⚁",
"⚂",
"⚃",
"⚄",
"⚅"
];

function rollDice(){

const dice=document.getElementById("dice");

const text=document.getElementById("number");

dice.classList.remove("roll");

void dice.offsetWidth;

dice.classList.add("roll");

const value=Math.floor(Math.random()*6)+1;

setTimeout(()=>{

dice.innerHTML=faces[value-1];

text.innerHTML="You rolled <b>"+value+"</b>!";

},220);

}

</script>

</body>
</html>
