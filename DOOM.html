<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎃 Pumpkin God Awakening 🎃</title>

<style>

body{
    background:#111;
    color:white;
    font-family:Arial,sans-serif;
    margin:0;
    padding:0;
    text-align:center;
    overflow:hidden;
}

header{
    background:linear-gradient(90deg,#ff6a00,#ff9500);
    padding:30px;
}

h1{
    margin:0;
    font-size:3em;
}

.main-box{
    background:#1c1c1c;
    border:2px solid #ff8800;
    border-radius:15px;
    margin:30px;
    padding:30px;
    box-shadow:0 0 20px rgba(255,136,0,.4);
}

#doomButton{
    font-size:32px;
    padding:20px 45px;
    border:none;
    border-radius:15px;
    cursor:pointer;
    color:white;
    background:linear-gradient(45deg,#ff6a00,#ff9500);
    box-shadow:0 0 30px orange;
    animation:pulse 2s infinite;
}

#doomButton:hover{
    transform:scale(1.05);
}

@keyframes pulse{
    0%{transform:scale(1);}
    50%{transform:scale(1.05);}
    100%{transform:scale(1);}
}

.explosion{
    position:fixed;
    font-size:100px;
    pointer-events:none;
    animation:explode 1.5s forwards;
}

@keyframes explode{
    from{
        opacity:1;
        transform:scale(0);
    }
    to{
        opacity:0;
        transform:scale(5);
    }
}

.shake{
    animation:shake 0.06s infinite;
}

@keyframes shake{
    0%{transform:translate(6px,6px);}
    25%{transform:translate(-6px,6px);}
    50%{transform:translate(6px,-6px);}
    75%{transform:translate(-6px,-6px);}
    100%{transform:translate(0,0);}
}

#pumpkin{
    width:550px;
    max-width:85vw;
    display:none;
    margin:30px auto;
    filter:
        drop-shadow(0 0 15px orange)
        drop-shadow(0 0 40px red);
}

.reveal{
    animation:reveal 2s forwards;
}

@keyframes reveal{
    0%{
        opacity:0;
        transform:scale(0);
    }

    60%{
        opacity:1;
        transform:scale(1.3);
    }

    100%{
        opacity:1;
        transform:scale(1);
    }
}

#godText{
    display:none;
    font-size:70px;
    font-weight:bold;
    color:gold;
    text-shadow:
        0 0 10px gold,
        0 0 20px orange,
        0 0 50px red;
    animation:flash 0.2s infinite;
}

@keyframes flash{
    0%{opacity:1;}
    50%{opacity:0.4;}
    100%{opacity:1;}
}

.footer{
    color:#ffae42;
    font-weight:bold;
    margin-top:20px;
}

</style>
</head>

<body>

<header>
    <h1>🌠 Pumpkin God Awakening 🌠</h1>
    <h3>The Ultimate Pumpkin Bros Event</h3>
</header>

<div class="main-box">

    <h2>☢️ Forbidden Ritual ☢️</h2>

    <p>
        Press the button below at your own risk...
    </p>

    <button id="doomButton" onclick="awaken()">
        🎃 AWAKEN THE PUMPKIN GOD 🎃
    </button>

    <br><br>

    <img id="pumpkin" src="">

    <div id="godText">
        👑 PUMPKIN GOD AWAKENED 👑
    </div>

</div>

<div class="footer">
    🎃⚔️ Every Season Is Pumpkin Season ⚔️🎃
</div>

<script>

function awaken(){

    document.getElementById("doomButton").disabled = true;

    document.body.classList.add("shake");

    let count = 0;

    let interval = setInterval(()=>{

        let boom = document.createElement("div");

        boom.className = "explosion";

        let effects = [
            "💥","🔥","⚡","☄️",
            "🌋","💀","🎃","👑",
            "🏆","🌠","⚔️"
        ];

        boom.innerHTML =
            effects[Math.floor(
                Math.random()*effects.length
            )];

        boom.style.left =
            Math.random()*window.innerWidth + "px";

        boom.style.top =
            Math.random()*window.innerHeight + "px";

        document.body.appendChild(boom);

        setTimeout(()=>{
            boom.remove();
        },1500);

        let colors = [
            "#111",
            "#ff0000",
            "#ff3300",
            "#ff6a00",
            "#660000"
        ];

        document.body.style.background =
            colors[Math.floor(
                Math.random()*colors.length
            )];

        count++;

        if(count > 150){

            clearInterval(interval);

            document.body.classList.remove("shake");

            document.body.style.background="#111";

            let pumpkin =
                document.getElementById("pumpkin");

            pumpkin.style.display="block";
            pumpkin.classList.add("reveal");

            let godText =
                document.getElementById("godText");

            godText.style.display="block";
        }

    },30);
}

</script>

</body>
</html>
