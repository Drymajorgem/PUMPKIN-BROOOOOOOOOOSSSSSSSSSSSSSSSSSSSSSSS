<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Pumpkin Bros Login</title>

<style>

body{
    background:#111;
    color:white;
    font-family:Arial,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

.box{

    width:350px;

    background:#1c1c1c;

    border-radius:20px;

    padding:30px;

    border:2px solid #ff8800;

}

h1{

    text-align:center;

    color:#ffae42;

}

input{

    width:100%;

    padding:12px;

    margin:10px 0;

    border:none;

    border-radius:10px;

    font-size:16px;

}

button{

    width:100%;

    padding:12px;

    margin-top:10px;

    border:none;

    border-radius:10px;

    background:#ff8800;

    color:white;

    font-size:18px;

    cursor:pointer;

}

button:hover{

    background:#ffaa00;

}

#message{

    margin-top:15px;

    text-align:center;

}

</style>

</head>

<body>

<div class="box">

<h1>🎃 Pumpkin Bros</h1>

<input
type="email"
id="email"
placeholder="Email">

<input
type="password"
id="password"
placeholder="Password">

<button id="registerBtn">

Register

</button>

<button id="loginBtn">

Login

</button>

<p id="message"></p>

</div>

<script type="module">

// We'll add Firebase code here next.

</script>

</body>
</html>
