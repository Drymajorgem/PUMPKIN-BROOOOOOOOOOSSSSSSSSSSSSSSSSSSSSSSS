<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Pumpkin Bros Login</title>

<style>

body{
    background:#111;
    color:white;
    font-family:Arial,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

.box{

    width:350px;

    background:#1c1c1c;

    border-radius:20px;

    padding:30px;

    border:2px solid #ff8800;

}

h1{

    text-align:center;

    color:#ffae42;

}

input{

    width:100%;

    padding:12px;

    margin:10px 0;

    border:none;

    border-radius:10px;

    font-size:16px;

}

button{

    width:100%;

    padding:12px;

    margin-top:10px;

    border:none;

    border-radius:10px;

    background:#ff8800;

    color:white;

    font-size:18px;

    cursor:pointer;

}

button:hover{

    background:#ffaa00;

}

#message{

    margin-top:15px;

    text-align:center;

}

</style>

</head>

<body>

<div class="box">

<h1>🎃 Pumpkin Bros</h1>

<input
type="email"
id="email"
placeholder="Email">

<input
type="password"
id="password"
placeholder="Password">

<button id="registerBtn">

Register

</button>

<button id="loginBtn">

Login

</button>

<p id="message"></p>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";

import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyB2HxW-Pg-CrC_6SKg6pnoJlXJZpOtAq5I",
  authDomain: "pumpkin-brossssssssssssss.firebaseapp.com",
  projectId: "pumpkin-brossssssssssssss",
  storageBucket: "pumpkin-brossssssssssssss.firebasestorage.app",
  messagingSenderId: "442990635356",
  appId: "1:442990635356:web:b7eb99910eadc8b8443999",
  measurementId: "G-Y333SC5RE5"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// Register
document.getElementById("registerBtn").addEventListener("click", async () => {

    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    try{

        await createUserWithEmailAndPassword(auth,email,password);

        document.getElementById("message").innerHTML =
        "✅ Account created successfully!";

    }catch(error){

        document.getElementById("message").innerHTML =
        "❌ " + error.message;

    }

});

// Login
document.getElementById("loginBtn").addEventListener("click", async () => {

    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    try{

        await signInWithEmailAndPassword(auth,email,password);

        window.location.href="profile.html";

    }catch(error){

        document.getElementById("message").innerHTML =
        "❌ " + error.message;

    }

});

</script>
    
</body>
</html>
